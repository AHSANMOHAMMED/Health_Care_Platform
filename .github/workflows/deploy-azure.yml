name: Build and Deploy to Azure AKS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  ACR_NAME: healthcaredsmediconnectreg
  RESOURCE_GROUP: my-assignment-group
  CLUSTER_NAME: mediconnect-aks

jobs:
  build-and-push-backend:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: 
          - admin-service
          - ai-service
          - api-gateway
          - appointment-service
          - auth-service
          - config-server
          - doctor-service
          - notification-service
          - patient-service
          - payment-service
          - prescription-service
          - service-registry
          - telemedicine-service
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -Dmaven.test.skip=true
        working-directory: backend/${{ matrix.service }}

      - name: Log in to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_NAME }}.azurecr.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/mediconnect-${{ matrix.service }}:latest .
          docker push ${{ env.ACR_NAME }}.azurecr.io/mediconnect-${{ matrix.service }}:latest
        working-directory: frontend

  build-and-push-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Log in to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_NAME }}.azurecr.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/mediconnect-frontend:latest .
          docker push ${{ env.ACR_NAME }}.azurecr.io/mediconnect-frontend:latest
        working-directory: frontend

  deploy-to-aks:
    needs: [build-and-push-backend, build-and-push-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set AKS Context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Deploy Infrastructure
        run: |
          kubectl apply -f k8s/infrastructure/platform-config.yaml
          kubectl apply -f k8s/infrastructure/config-secret.yaml
          kubectl apply -f k8s/infrastructure/rabbitmq.yaml
          kubectl apply -f k8s/infrastructure/rabbitmq-deployment.yaml

      - name: Deploy Services
        run: |
          kubectl apply -f k8s/services/
          kubectl apply -f k8s/ingress.yaml
