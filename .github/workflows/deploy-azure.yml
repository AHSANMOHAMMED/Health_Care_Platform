name: Build and Deploy to Azure AKS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  ACR_NAME: healthcaredsmediconnectreg
  RESOURCE_GROUP: my-assignment-group
  CLUSTER_NAME: mediconnect-aks

jobs:
  build-and-push-backend:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: 
          - admin-service
          - ai-service
          - api-gateway
          - appointment-service
          - auth-service
          - config-server
          - doctor-service
          - notification-service
          - patient-service
          - payment-service
          - prescription-service
          - service-registry
          - telemedicine-service
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR with Maven
        run: mvn clean package -Dmaven.test.skip=true
        working-directory: backend/${{ matrix.service }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_NAME }}.azurecr.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/mediconnect-${{ matrix.service }}:latest .
          docker push ${{ env.ACR_NAME }}.azurecr.io/mediconnect-${{ matrix.service }}:latest
        working-directory: backend/${{ matrix.service }}

  build-and-push-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_GATEWAY_URL: https://mediconnect-api-gateway.azurewebsites.net/api

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_NAME }}.azurecr.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build --build-arg VITE_API_GATEWAY_URL=https://mediconnect-api-gateway.azurewebsites.net/api -t ${{ env.ACR_NAME }}.azurecr.io/mediconnect-frontend:latest .
          docker push ${{ env.ACR_NAME }}.azurecr.io/mediconnect-frontend:latest
        working-directory: frontend

  deploy-to-aks:
    needs: [build-and-push-backend, build-and-push-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set AKS Context
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | tr -dc 'a-zA-Z0-9+/=' | base64 --decode > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Install NGINX Ingress Controller
        run: |
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo update
          helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
            --namespace ingress-nginx --create-namespace \
            --set controller.service.annotations."service\.beta\.kubernetes\.io/azure-load-balancer-health-probe-request-path"=/healthz

      - name: Deploy Infrastructure
        run: |
          kubectl apply -f k8s/infrastructure/

      - name: Deploy Services
        run: |
          kubectl apply -f k8s/services/
          kubectl apply -f k8s/ingress.yaml
          
      - name: Force Rollout Restart (Refresh Everything)
        run: |
          kubectl rollout restart deployment/frontend
          kubectl rollout restart deployment/api-gateway
          kubectl rollout restart deployment/auth-service
          kubectl rollout restart deployment/config-server
          kubectl rollout restart deployment/service-registry
          kubectl rollout restart deployment/admin-service
          kubectl rollout restart deployment/ai-service
          kubectl rollout restart deployment/appointment-service
          kubectl rollout restart deployment/doctor-service
          kubectl rollout restart deployment/notification-service
          kubectl rollout restart deployment/patient-service
          kubectl rollout restart deployment/payment-service
          kubectl rollout restart deployment/prescription-service
          kubectl rollout restart deployment/telemedicine-service
