services:
  discovery-service:
    build:
      context: .
      dockerfile: services/discovery-service/Dockerfile
    ports:
      - "8761:8761"
    environment:
      SPRING_PROFILES_ACTIVE: docker

  postgres-user:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: health
      POSTGRES_PASSWORD: health
    ports:
      - "5433:5432"
    volumes:
      - pg-user:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U health -d userdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-doctor:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: doctordb
      POSTGRES_USER: health
      POSTGRES_PASSWORD: health
    ports:
      - "5434:5432"
    volumes:
      - pg-doctor:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U health -d doctordb"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-appointment:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: appointmentdb
      POSTGRES_USER: health
      POSTGRES_PASSWORD: health
    ports:
      - "5435:5432"
    volumes:
      - pg-appointment:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U health -d appointmentdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-telemedicine:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: telemedicinedb
      POSTGRES_USER: health
      POSTGRES_PASSWORD: health
    ports:
      - "5436:5432"
    volumes:
      - pg-telemedicine:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U health -d telemedicinedb"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-payment:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: paymentdb
      POSTGRES_USER: health
      POSTGRES_PASSWORD: health
    ports:
      - "5437:5432"
    volumes:
      - pg-payment:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U health -d paymentdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    depends_on:
      discovery-service:
        condition: service_started
      postgres-user:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-user:5432/userdb
      SPRING_DATASOURCE_USERNAME: health
      SPRING_DATASOURCE_PASSWORD: health
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      JWT_SECRET: ${JWT_SECRET:-dev-change-me-use-at-least-32-bytes-secret-key!!}

  doctor-service:
    build:
      context: .
      dockerfile: services/doctor-service/Dockerfile
    depends_on:
      discovery-service:
        condition: service_started
      postgres-doctor:
        condition: service_healthy
      user-service:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-doctor:5432/doctordb
      SPRING_DATASOURCE_USERNAME: health
      SPRING_DATASOURCE_PASSWORD: health
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      JWT_SECRET: ${JWT_SECRET:-dev-change-me-use-at-least-32-bytes-secret-key!!}
      USER_SERVICE_URL: http://user-service:8081

  appointment-service:
    build:
      context: .
      dockerfile: services/appointment-service/Dockerfile
    depends_on:
      discovery-service:
        condition: service_started
      postgres-appointment:
        condition: service_healthy
      doctor-service:
        condition: service_started
      user-service:
        condition: service_started
      telemedicine-service:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-appointment:5432/appointmentdb
      SPRING_DATASOURCE_USERNAME: health
      SPRING_DATASOURCE_PASSWORD: health
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      JWT_SECRET: ${JWT_SECRET:-dev-change-me-use-at-least-32-bytes-secret-key!!}
      DOCTOR_SERVICE_URL: http://doctor-service:8082
      USER_SERVICE_URL: http://user-service:8081
      TELEMEDICINE_SERVICE_URL: http://telemedicine-service:8084
      RABBITMQ_HOST: rabbitmq

  telemedicine-service:
    build:
      context: .
      dockerfile: services/telemedicine-service/Dockerfile
    depends_on:
      discovery-service:
        condition: service_started
      postgres-telemedicine:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-telemedicine:5432/telemedicinedb
      SPRING_DATASOURCE_USERNAME: health
      SPRING_DATASOURCE_PASSWORD: health
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      JWT_SECRET: ${JWT_SECRET:-dev-change-me-use-at-least-32-bytes-secret-key!!}
      AGORA_APP_ID: ${AGORA_APP_ID:-}
      AGORA_APP_CERTIFICATE: ${AGORA_APP_CERTIFICATE:-}

  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    depends_on:
      discovery-service:
        condition: service_started
      postgres-payment:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-payment:5432/paymentdb
      SPRING_DATASOURCE_USERNAME: health
      SPRING_DATASOURCE_PASSWORD: health
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      JWT_SECRET: ${JWT_SECRET:-dev-change-me-use-at-least-32-bytes-secret-key!!}
      PAYHERE_MERCHANT_ID: ${PAYHERE_MERCHANT_ID:-}
      PAYHERE_MERCHANT_SECRET: ${PAYHERE_MERCHANT_SECRET:-}
      PAYHERE_SANDBOX: ${PAYHERE_SANDBOX:-true}
      RABBITMQ_HOST: rabbitmq

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    depends_on:
      discovery-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_PHONE: ${TWILIO_FROM_PHONE:-}
      RABBITMQ_HOST: rabbitmq

  ai-service:
    build:
      context: .
      dockerfile: services/ai-service/Dockerfile
    depends_on:
      discovery-service:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      JWT_SECRET: ${JWT_SECRET:-dev-change-me-use-at-least-32-bytes-secret-key!!}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - discovery-service
      - user-service
      - doctor-service
      - appointment-service
      - telemedicine-service
      - payment-service
      - notification-service
      - ai-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      JWT_SECRET: ${JWT_SECRET:-dev-change-me-use-at-least-32-bytes-secret-key!!}

volumes:
  pg-user:
  pg-doctor:
  pg-appointment:
  pg-telemedicine:
  pg-payment:
