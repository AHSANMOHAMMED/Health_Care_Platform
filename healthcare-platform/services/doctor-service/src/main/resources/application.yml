server:
  port: 8082

spring:
  application:
    name: doctor-service
  datasource:
    url: jdbc:postgresql://localhost:5434/doctordb
    username: health
    password: health
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

clients:
  user-service-url: http://localhost:8081

jwt:
  secret: ${JWT_SECRET:dev-change-me-use-at-least-32-bytes-secret-key!!}

management:
  endpoints:
    web:
      exposure:
        include: health,info

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres-doctor:5432/doctordb}
    username: ${SPRING_DATASOURCE_USERNAME:health}
    password: ${SPRING_DATASOURCE_PASSWORD:health}
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://discovery-service:8761/eureka/}
clients:
  user-service-url: ${USER_SERVICE_URL:http://user-service:8081}
