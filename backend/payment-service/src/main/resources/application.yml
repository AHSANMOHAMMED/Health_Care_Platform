server:
  port: 8085

spring:
  application:
    name: payment-service
  config:
    import: "optional:configserver:http://localhost:8888/"
  datasource:
    url: jdbc:postgresql://localhost:5432/payment_db
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:rootpassword}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    username: ${SPRING_RABBITMQ_USERNAME:root}
    password: ${SPRING_RABBITMQ_PASSWORD:rootpassword}
    port: 5673

# Stripe Configuration
stripe:
  api:
    secret-key: ${STRIPE_API_SECRET_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  enabled: ${STRIPE_ENABLED:false}

# PayHere Configuration (Legacy)
payhere:
  merchant-id: ${PAYHERE_MERCHANT_ID:}
  merchant-secret: ${PAYHERE_MERCHANT_SECRET:}
  enabled: ${PAYHERE_ENABLED:false}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

logging:
  level:
    com.mediconnect.paymentservice: DEBUG
