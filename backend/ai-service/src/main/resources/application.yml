server:
  port: 8088

spring:
  application:
    name: ai-service
  config:
    import: "optional:configserver:http://localhost:8888/"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

gemini:
  api:
    key: ${GEMINI_API_KEY:mock_key}

logging:
  level:
    com.mediconnect.aiservice: DEBUG
