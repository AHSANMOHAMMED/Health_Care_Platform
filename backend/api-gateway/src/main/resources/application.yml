server:
  port: 8080

spring:
  application:
    name: api-gateway
  config:
    import: "optional:configserver:http://${CONFIG_SERVER_HOST:localhost}:8888/"
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
            - AuthenticationFilter
        
        - id: patient-service
          uri: http://patient-service:8082
          predicates:
            - Path=/api/patients/**
          filters:
            - StripPrefix=1
            - AuthenticationFilter
            
        - id: doctor-service
          uri: http://doctor-service:8083
          predicates:
            - Path=/api/doctors/**
          filters:
            - StripPrefix=1
            - AuthenticationFilter
            
        - id: appointment-service
          uri: http://appointment-service:8084
          predicates:
            - Path=/api/appointments/**
          filters:
            - StripPrefix=1
            - AuthenticationFilter
            
        - id: ai-service
          uri: http://ai-service:8088
          predicates:
            - Path=/api/ai/**
          filters:
            - StripPrefix=1
            - AuthenticationFilter
            
        - id: prescription-service
          uri: lb://PRESCRIPTION-SERVICE
          predicates:
            - Path=/api/prescriptions/**
          filters:
            - StripPrefix=1
            - AuthenticationFilter
            
        - id: telemedicine-service
          uri: lb://TELEMEDICINE-SERVICE
          predicates:
            - Path=/api/telemedicine/**
          filters:
            - StripPrefix=1
            - AuthenticationFilter
            
        - id: payment-service
          uri: http://payment-service:8085
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=1
            - AuthenticationFilter
            
        - id: notification-service
          uri: http://notification-service:8086
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=1
            - AuthenticationFilter

        - id: admin-service
          uri: http://admin-service:8089
          predicates:
            - Path=/api/admin/**
          filters:
            - StripPrefix=1
            - AuthenticationFilter

        - id: prescription-service
          uri: lb://PRESCRIPTION-SERVICE
          predicates:
            - Path=/api/prescriptions/**
          filters:
            - StripPrefix=1
            - AuthenticationFilter

jwt:
  secret: ${JWT_SECRET:mediconnect_super_secret_jwt_key_that_must_be_long_enough}
