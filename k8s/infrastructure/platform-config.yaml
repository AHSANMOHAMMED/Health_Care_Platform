apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-config
data:
  SPRING_PROFILES_ACTIVE: "native"
  EUREKA_CLIENT_REGISTERWITH_EUREKA: "false"
  EUREKA_CLIENT_FETCHREGISTRY: "false"
  EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://service-registry:8761/eureka/"
  SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
  SPRING_RABBITMQ_HOST: "rabbitmq"
  DB_HOST: "my-dsproject-deploy-2026.postgres.database.azure.com"
  DB_PORT: "5432"
---
apiVersion: v1
kind: Secret
metadata:
  name: platform-secret
type: Opaque
stringData:
  SPRING_DATASOURCE_USERNAME: "root"
  SPRING_DATASOURCE_PASSWORD: "rootpassword"
  SPRING_RABBITMQ_USERNAME: "root"
  SPRING_RABBITMQ_PASSWORD: "rootpassword"
  JWT_SECRET: "mediconnect_super_secret_jwt_key_that_must_be_long_enough"
  GEMINI_API_KEY: "insert-key-here"
