services:
  # ==========================================
  # INFRASTRUCTURE SERVICES
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: mediconnect-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/db-init:/docker-entrypoint-initdb.d
    networks:
      - mediconnect-network
    deploy:
      resources:
        limits:
          memory: 256M

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: mediconnect-rabbitmq
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: root
      RABBITMQ_DEFAULT_PASS: rootpassword
    networks:
      - mediconnect-network
    deploy:
      resources:
        limits:
          memory: 256M

  # ==========================================
  # PLATFORM CORE SERVICES
  # ==========================================
  config-server:
    build:
      context: ./backend/config-server
    container_name: mediconnect-config-server
    ports:
      - "8888:8888"
    environment:
      - SPRING_PROFILES_ACTIVE=native
      - JAVA_OPTS=-Xmx256m -Xms128m
    networks:
      - mediconnect-network
    deploy:
      resources:
        limits:
          memory: 384M

  service-registry:
    build:
      context: ./backend/service-registry
    container_name: mediconnect-service-registry
    ports:
      - "8761:8761"
    environment:
      - EUREKA_CLIENT_REGISTERWITH_EUREKA=false
      - EUREKA_CLIENT_FETCHREGISTRY=false
      - JAVA_OPTS=-Xmx256m -Xms128m
    networks:
      - mediconnect-network
    deploy:
      resources:
        limits:
          memory: 384M
    depends_on:
      - config-server

  api-gateway:
    build:
      context: ./backend/api-gateway
    container_name: mediconnect-api-gateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888/
      - JAVA_OPTS=-Xmx384m -Xms256m
    networks:
      - mediconnect-network
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      - service-registry

  # ==========================================
  # DOMAIN MICROSERVICES
  # ==========================================
  auth-service:
    build: ./backend/auth-service
    container_name: mediconnect-auth-service
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/auth_db
      - SPRING_DATASOURCE_USERNAME=root
      - POSTGRES_PASSWORD=rootpassword
      - JAVA_OPTS=-Xmx384m -Xms256m
    networks:
      - mediconnect-network
    deploy:
      resources:
        limits:
          memory: 448M
    depends_on:
      - postgres
      - service-registry

  patient-service:
    build: ./backend/patient-service
    container_name: mediconnect-patient-service
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/patient_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=rootpassword
      - JAVA_OPTS=-Xmx384m -Xms256m
    networks:
      - mediconnect-network
    deploy:
      resources:
        limits:
          memory: 448M
    depends_on:
      - postgres
      - service-registry

  doctor-service:
    build: ./backend/doctor-service
    container_name: mediconnect-doctor-service
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/doctor_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=rootpassword
      - JAVA_OPTS=-Xmx384m -Xms256m
    networks:
      - mediconnect-network
    deploy:
      resources:
        limits:
          memory: 448M
    depends_on:
      - postgres
      - service-registry

  appointment-service:
    build: ./backend/appointment-service
    container_name: mediconnect-appointment-service
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/appointment_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=rootpassword
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_USERNAME=root
      - SPRING_RABBITMQ_PASSWORD=rootpassword
      - JAVA_OPTS=-Xmx384m -Xms256m
    networks:
      - mediconnect-network
    deploy:
      resources:
        limits:
          memory: 448M
    depends_on:
      - postgres
      - rabbitmq
      - service-registry

  payment-service:
    build: ./backend/payment-service
    container_name: mediconnect-payment-service
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/payment_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=rootpassword
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_USERNAME=root
      - SPRING_RABBITMQ_PASSWORD=rootpassword
      - STRIPE_API_SECRET_KEY=${STRIPE_API_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_ENABLED=${STRIPE_ENABLED:-false}
      - JAVA_OPTS=-Xmx384m -Xms256m
    networks:
      - mediconnect-network
    deploy:
      resources:
        limits:
          memory: 448M
    depends_on:
      - postgres
      - rabbitmq
      - service-registry

  notification-service:
    build: ./backend/notification-service
    container_name: mediconnect-notification-service
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888/
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_USERNAME=root
      - SPRING_RABBITMQ_PASSWORD=rootpassword
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL:-noreply@mediconnect.lk}
      - SENDGRID_FROM_NAME=${SENDGRID_FROM_NAME:-MediConnect Lanka}
      - SENDGRID_ENABLED=${SENDGRID_ENABLED:-false}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER:-}
      - TWILIO_ENABLED=${TWILIO_ENABLED:-false}
      - EMAIL_NOTIFICATIONS_ENABLED=${EMAIL_NOTIFICATIONS_ENABLED:-true}
      - SMS_NOTIFICATIONS_ENABLED=${SMS_NOTIFICATIONS_ENABLED:-true}
      - JAVA_OPTS=-Xmx384m -Xms256m
    networks:
      - mediconnect-network
    deploy:
      resources:
        limits:
          memory: 448M
    depends_on:
      - rabbitmq
      - service-registry

  telemedicine-service:
    build: ./backend/telemedicine-service
    container_name: mediconnect-telemedicine-service
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/telemedicine_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=rootpassword
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - JAVA_OPTS=-Xmx384m -Xms256m
    networks:
      - mediconnect-network
    deploy:
      resources:
        limits:
          memory: 448M
    depends_on:
      - postgres
      - service-registry

  ai-service:
    build: ./backend/ai-service
    container_name: mediconnect-ai-service
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/ai_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=rootpassword
      - GEMINI_API_KEY=${GEMINI_API_KEY:-mock-key}
      - JAVA_OPTS=-Xmx384m -Xms256m
    networks:
      - mediconnect-network
    deploy:
      resources:
        limits:
          memory: 448M
    depends_on:
      - postgres
      - service-registry

  # NEW: Prescription Service
  prescription-service:
    build: ./backend/prescription-service
    container_name: mediconnect-prescription-service
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/prescription_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=rootpassword
      - JAVA_OPTS=-Xmx384m -Xms256m
    networks:
      - mediconnect-network
    deploy:
      resources:
        limits:
          memory: 448M
    depends_on:
      - postgres
      - service-registry

  # NEW: Admin Service
  admin-service:
    build: ./backend/admin-service
    container_name: mediconnect-admin-service
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/admin_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=rootpassword
      - JAVA_OPTS=-Xmx384m -Xms256m
    networks:
      - mediconnect-network
    deploy:
      resources:
        limits:
          memory: 448M
    depends_on:
      - postgres
      - service-registry
      - patient-service
      - doctor-service
      - appointment-service

  frontend:
    build:
      context: ./frontend
    container_name: mediconnect-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_GATEWAY_URL=http://localhost:8080
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - mediconnect-network
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      - api-gateway

networks:
  mediconnect-network:
    driver: bridge

volumes:
  postgres-data:
